version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexuspass}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_commerce}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data_prod:/data
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus_backend_prod
    restart: always
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
    networks:
      - nexus_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus_frontend_prod
    restart: always
    env_file: ./frontend/.env.local
    environment:
      NODE_ENV: production
    networks:
      - nexus_network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nexus_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs_prod:/var/log/nginx
    networks:
      - nexus_network
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data_prod:
  redis_data_prod:
  nginx_logs_prod:

networks:
  nexus_network:
    driver: bridge